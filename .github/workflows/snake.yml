name: generate-dark-core-snake

on:
  schedule:
    - cron: "30 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate Dynamic Mathematical Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # 1. Standard Light Mode (Required so the image doesn't break for light-mode users)
            dist/github-contribution-grid-snake.svg?color_bg=transparent
            # 2. Your Dynamic Matrix/Cyberpunk Snake
            dist/github-contribution-grid-snake-dynamic.svg?color_snake=#FF0055&color_dots=#0d1117,#003344,#006688,#0099CC,#00E5FF&color_bg=transparent
          
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update dynamic math snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
